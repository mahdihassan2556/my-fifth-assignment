<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- tailwind and daisyui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <!-- google font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<style>
    *{
        font-family: "Geist", sans-serif;
    }
</style>
</head>
<body>
    <section class="w-10/12 sm:w-10/12 md:w-7/12 lg:w-5/12 mx-auto mt-13 shadow-lg">
        <div class=" mx-auto text-center">
            <img src="./assets/github-logo.png" alt="" class=" mx-auto mb-4 pt-8">
            <h1 class="text-3xl font-semibold mb-2">GitHub Issues Tracker</h1>
            <p class="text-[#64748B]">Sign in to manage your issues</p>
        </div>

        <div class="p-5">
            <fieldset class="fieldset">
                <label class="text-[18px] font-semibold">Username</label>
                <input type="text" placeholder="Enter Username" class="p-2 rounded-md border-[#E4E4E7]" id="username-input">
                <p class="text-[#4A00FF] mb-3">Default: admin</p>
                <label class="text-[18px] font-semibold">Password</label>
                <input type="password" placeholder="Enter Password" class="p-2 rounded-md border-[#E4E4E7]" id="password-input">
                 <p class="text-[#4A00FF] mb-3">Default: admin123</p>
                 <button class="btn btn-primary" id="btn-login">
                    Sign In
                 </button>
                 
            </fieldset>
            <div class="mx-auto text-center my-7">
            <p class="">OR</p>
            <p class="text-[#64748B] my-7">Demo Credentials:</p>
            <p class="font-semibold">Username: admin</p>
            <p class="font-semibold">Password: admin123</p>
            </div>
        </div>
    </section>
    <script src="style.js/index.js"></script>
</body>
</html>
