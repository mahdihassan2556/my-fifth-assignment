<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- tailwind and daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        .open{
            color: #00A96E;
            font-size: 15px;
        }
        .close{
            color: #A855F7;
            font-size: 15px;
        }
        .small{
            font-size: 6px;
            color: grey;
           
        }
    </style>
</head>

<body>

    <header class="shadow-sm">
        <nav class="flex justify-between w-11/12 mx-auto py-4">
            <div class="flex items-center gap-2">
                <img src="./assets/github-logo.png" alt="" class="w-[35px] h-[35px]">
                <p class="text-xl font-bold">GitHub Issues Tracker</p>
            </div>
            <div class="flex gap-2">
             <div class="join">
  <div>
    <label class="input validator join-item">
      
      <input id="input-search" type="text" placeholder="Search issues..." required />
    </label>
    <div class="validator-hint hidden">Enter valid email address</div>
  </div>
  <button id="btn-search" class="btn btn-primary join-item">Search</button>
</div>
                <button class="btn btn-primary">+ New Issue</button>
            </div>
        </nav>
    </header>

    <main class="w-10/12 mx-auto">
        <section class="shadow-md p-5 rounded-md space-x-2 mt-15">
            <button class="btn px-8" id="all-btn">All</button>
            <button class="btn px-7" id="open-btn">Open</button>
            <button class="btn px-7" id="closed-btn">Closed</button>
        </section>

        <section class="mt-6">
            <div class=" gap-3 p-4 shadow-md flex justify-between rounded-md ">
                <div class="flex gap-2">
                    <img src="./assets/Aperture.png" alt="" class="w-[50px] h-[50px] p-2 bg-[#ECE4FF] rounded-full">

                    <div>
                        <h2 id="issues-count" class="text-xl font-semibold">0 </h2>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-3 items-center">
                    <p> <i class="fa-solid fa-circle open"></i>    Open</p>
                    <p> <i class="fa-solid fa-circle close"></i>    Closed</p>
                </div>
            </div>
        </section>

        <section id="card-container" class="grid grid-cols-4 gap-3 shadow-md">

        </section>
    </main>


    <dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box space-y-4" id="details-container">

        </div>
    </dialog>


    <script src="style.js/script.js"></script>
</body>

</html>
