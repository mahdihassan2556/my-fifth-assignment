<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- tailwind and daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

</head>

<body>

    <header class="shadow-sm">
        <nav class="flex justify-between w-11/12 mx-auto py-4">
            <div class="flex items-center gap-2">
                <img src="./assets/github-logo.png" alt="" class="w-[35px] h-[35px]">
                <p class="text-xl font-bold">GitHub Issues Tracker</p>
            </div>
            <div class="flex gap-2">
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input type="search" required placeholder="Search" />
                </label>
                <button class="btn btn-primary">+ New Issue</button>
            </div>
        </nav>
    </header>

    <main class="w-10/12 mx-auto">
        <section class="shadow-md p-5 rounded-md space-x-2 mt-15">
            <button class="btn px-8" id="all-btn">All</button>
            <button class="btn px-7" id="open-btn">Open</button>
            <button class="btn px-7" id="closed-btn">Closed</button>
        </section>

        <section class="mt-6">
            <div class=" gap-3 p-4 shadow-md flex justify-between rounded-md ">
                <div class="flex gap-2">
                    <img src="./assets/Aperture.png" alt="" class="w-[50px] h-[50px] p-2 bg-[#ECE4FF] rounded-full">

                    <div>
                        <h2 class="text-xl font-semibold">50 Issues</h2>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-3 items-center">
                    <p>Open</p>
                    <p>Closed</p>
                </div>
            </div>
        </section>

        <section id="card-container" class="grid grid-cols-4 gap-3 shadow-md">
          
        </section>
    </main>

    <script src="style.js/script.js"></script>
</body>

</html>
